apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-fullmakt-godkjenning-api-u1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: repo.adeo.no:5443/oebs/oebs-fullmakt-godkjenning-api:0.0.5
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    requests:
      cpu: 400m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  azure:
    application:
      enabled: true
      allowAllUsers: true

  prometheus:
    enabled: true
    path: /actuator/prometheus
  vault:
    enabled: true
    paths:
      - kvPath: "kv/preprod/fss/oebs-fullmakt-godkjenning-api-u1/team-oebs"
        mountPath: "/var/run/secrets/nais.io/vault"

  ingresses:
     - "https://oebs-fullmakt-godkjenning-api-u1.dev.intern.nav.no"