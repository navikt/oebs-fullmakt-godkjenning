apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-fullmakt-godkjenning-api-t1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    requests:
      cpu: 50m
      memory: 416Mi
    limits:
      memory: 416Mi
  azure:
    application:
      enabled: true
      allowAllUsers: true

  prometheus:
    enabled: true
    path: /actuator/prometheus
  vault:
    enabled: true
    paths:
      - kvPath: "kv/preprod/fss/oebs-fullmakt-godkjenning-api-t1/team-oebs"
        mountPath: "/var/run/secrets/nais.io/vault"

  ingresses:
    - "https://oebs-fullmakt-godkjenning-api-t1.intern.dev.nav.no"